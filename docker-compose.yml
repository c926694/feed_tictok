services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: >
      --port=3307
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: feed_video
      TZ: Asia/Shanghai
    ports:
      - "3308:3307"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3307 -uroot -p1234 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6380"]
    restart: unless-stopped
    ports:
      - "6381:6380"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5674:5673"
      - "15674:15673"
    volumes:
      - ./deploy/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      STORAGE_PATH: /app/storage
      HTTP_PATH: /static/
    ports:
      - "8082:8081"
    volumes:
      - app_storage:/app/storage
      - ./back/config/config.compose.example.yaml:/app/config/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  listener:
    build:
      context: ./back
      dockerfile: Dockerfile
    command: ["/app/start-listener.sh"]
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      STORAGE_PATH: /app/storage
      HTTP_PATH: /static/
    volumes:
      - app_storage:/app/storage
      - ./back/config/config.compose.example.yaml:/app/config/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: ./front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "82:81"
    volumes:
      - app_storage:/var/www/static:ro
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  app_storage:
